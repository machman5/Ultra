- name: Setup: Java   
uses: actions/setup-java@v1       
with:         java-version: 1.8      
- name: Cache: Gradle   
uses: actions/cache@v2       
with:         
path: |           ~/.gradle           .gradle         key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('gradle/wrapper/gradle-wrapper.*') }}      
- name: Build: Project with make    
run: make clean all      
- name: Build: List dist files       
if: always()       
run: find dist -type f -maxdepth 2      
- name: Artifacts: All     
if: always()       
uses: actions/upload-artifact@v2.2.1       
with:         
- name: all         
path: dist         
retention-days: 100      
- name: Artifacts: Android APK    
uses: actions/upload-artifact@v2.2.1       
with:         
- name: android-apk     
path: |           dist/*.apk
